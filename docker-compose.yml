services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://backend:8080
    depends_on:
      - backend
    # Mount source for hot reload during dev; keep container's node_modules.
    volumes:
      - ./frontend:/app
      - /app/node_modules

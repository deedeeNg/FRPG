services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    working_dir: /home/dynamodblocal
    user: root
    ports:
      - "8000:8000"
    volumes:
      - dynamodb-data:/home/dynamodblocal/data

  # Optional web UI to eyeball the tables/items at http://localhost:8001
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    ports:
      - "8001:8001"
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=local
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    depends_on:
      - dynamodb-local

  # One-shot: create the Users table + seed test users (Go seeder).
  # Run explicitly with:  docker compose --profile seed up dynamo-seed
  dynamo-seed:
    image: golang:1.22
    profiles: ["seed"]
    working_dir: /app
    depends_on:
      - dynamodb-local
    environment:
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_REGION=local
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - USERS_TABLE=Users
      - GOFLAGS=-mod=mod
    command: ["go", "run", "./cmd/seed"]
    volumes:
      - ./backend:/app
      - go-mod-cache:/go/pkg/mod

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=local
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - USERS_TABLE=Users
    depends_on:
      - dynamodb-local

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://backend:8080
    depends_on:
      - backend
    # Mount source for hot reload during dev; keep container's node_modules.
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  dynamodb-data:
  go-mod-cache:

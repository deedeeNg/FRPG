name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (vet, dead code, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # `stable` (>=1.25) also satisfies the deadcode analyzer's toolchain need.
          go-version: stable
          cache-dependency-path: backend/go.sum

      - name: go vet
        run: go vet ./...

      - name: Dead code check
        run: |
          # go vet does NOT find dead code; the deadcode analyzer traces reachability
          # from main. Any output means unreachable code -> fail the build.
          go run golang.org/x/tools/cmd/deadcode@latest ./... | tee deadcode.txt
          if [ -s deadcode.txt ]; then
            echo "::error::unreachable (dead) code found — see above"
            exit 1
          fi
          echo "no dead code"

      - name: Unit tests
        run: go test ./...

  docker-compose:
    name: Build & run (docker compose)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/health; then
              echo "backend healthy"
              exit 0
            fi
            echo "waiting for backend... ($i)"
            sleep 2
          done
          echo "backend did not become healthy"
          docker compose logs
          exit 1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173/ >/dev/null; then
              echo "frontend up"
              exit 0
            fi
            echo "waiting for frontend... ($i)"
            sleep 2
          done
          echo "frontend did not come up"
          docker compose logs
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down
